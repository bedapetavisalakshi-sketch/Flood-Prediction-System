<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flood Prediction Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Moving Clouds -->
    <img src="{{ url_for('static', filename='cloud.png') }}" class="cloud cloud1" alt="Cloud">

    <img src="{{ url_for('static', filename='cloud.png') }}" class="cloud cloud2" alt="Cloud">

    <img src="{{ url_for('static', filename='cloud.png') }}" class="cloud cloud3" alt="Cloud">

    <!-- Main Container -->
    <div class="container">

        <h1>🌊 Flood Prediction Dashboard</h1>

        <!-- Flood Image -->
        <img src="{{ url_for('static', filename='flood.jpg') }}"
             class="flood-img"
             alt="Flood Image">

        <form action="/predict" method="POST">

            <label>Disaster Type</label>
            <select name="Disaster_Type" required>
                <option value="0">Flood</option>
                <option value="1">Cyclone</option>
                <option value="2">Storm</option>
                <option value="3">Landslide</option>
            </select>

            <label>Latitude</label>
            <input type="number" step="any" name="Latitude" required>

            <label>Longitude</label>
            <input type="number" step="any" name="Longitude" required>

            <label>Total Deaths</label>
            <input type="number" name="Total_Deaths" required>

            <label>Total Affected</label>
            <input type="number" name="Total_Affected" required>

            <label>Duration</label>
            <input type="number" name="duration" required>

            <label>Time</label>
            <input type="number" name="time" required>

            <label>Rainfall</label>
            <input type="number" step="any" name="Rainfall" required>

            <label>Elevation</label>
            <input type="number" step="any" name="Elevation" required>

            <label>Slope</label>
            <input type="number" step="any" name="Slope" required>

            <label>Distance</label>
            <input type="number" step="any" name="distance" required>

            <button type="submit">
                🌊 Predict Flood
            </button>

        </form>

        {% if prediction %}

        <div class="result-card">

            <h2>{{ prediction }}</h2>

            <h3>Flood Risk : {{ risk }}%</h3>

            <canvas id="riskChart"></canvas>

            <br><br>

            <canvas id="barChart"></canvas>

        </div>

        <script>

            const rainfall = Number("{{ rainfall|default(0) }}");
            const deaths = Number("{{ deaths|default(0) }}");
            const affected = Number("{{ affected|default(0) }}");
            const risk = Number("{{ risk|default(0) }}");

            // Doughnut Chart

            new Chart(document.getElementById("riskChart"), {

                type: "doughnut",

                data: {

                    labels: ["Flood Risk", "Safe"],

                    datasets: [{

                        data: [risk, 100 - risk],

                        backgroundColor: [
                            "#F44336",
                            "#4CAF50"
                        ]

                    }]

                },

                options: {

                    responsive: true,

                    plugins: {

                        legend: {
                            labels: {
                                color: "white"
                            }
                        }

                    }

                }

            });

            // Bar Chart

            new Chart(document.getElementById("barChart"), {

                type: "bar",

                data: {

                    labels: [
                        "Rainfall",
                        "Deaths",
                        "Affected"
                    ],

                    datasets: [{

                        label: "Entered Values",

                        data: [
                            rainfall,
                            deaths,
                            affected
                        ],

                        backgroundColor: [
                            "#03A9F4",
                            "#F44336",
                            "#4CAF50"
                        ]

                    }]

                },

                options: {

                    responsive: true,

                    scales: {

                        y: {
                            beginAtZero: true
                        }

                    }

                }

            });

        </script>

        {% endif %}

    </div>

    <!-- Water Waves -->

    <div class="waves">

        <div class="wave wave1"></div>

        <div class="wave wave2"></div>

        <div class="wave wave3"></div>

    </div>

    <!-- Rain Effect -->

    <div class="rain"></div>

</body>

</html>
